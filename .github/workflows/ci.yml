name: CI

# Fast correctness gate on every push/PR: backend lint + tests, frontend lint +
# type-checked build. The packaging workflows (build-*.yml) stay heavyweight and
# main/tag-only; this one is meant to run on branches.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff
      - name: Lint (ruff)
        run: ruff check backend
      - name: Tests (pytest)
        run: python -m pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check + build
        run: npm run build
